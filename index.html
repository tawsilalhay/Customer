<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
</head>
<body style="font-family:system-ui;padding:20px;direction:rtl">
<h2>🔍 تشخيص Firebase Rules</h2>
<div id="log" style="font-size:14px;line-height:2"></div>
<script>
var FB={apiKey:'AIzaSyCY31rq2Z608u7O6iFzE6',authDomain:'twsilya.firebaseapp.com',databaseURL:'https://twsilya-default-rtdb.asia-southeast1.firebasedatabase.app',projectId:'twsilya',storageBucket:'twsilya.firebasestorage.app',messagingSenderId:'191977779172',appId:'1:191977779172:web:9297f1be500b4d1cc8e1f1'};
var lg=document.getElementById('log');
function log(m,c){lg.innerHTML+='<div style="color:'+(c||'#000')+'">'+m+'</div>';}
try{
  var app=firebase.initializeApp(FB);
  var db=firebase.database();
  log('✅ Firebase init OK','green');
  
  // Test 1: .info/connected
  db.ref('.info/connected').once('value',function(s){
    log('✅ .info/connected: '+s.val(),'green');
  },function(e){log('❌ .info error: '+e.message,'red');});
  
  // Test 2: stores with .on
  log('⏳ جاري قراءة stores بـ .on ...','orange');
  var timeout=setTimeout(function(){
    log('❌ TIMEOUT - لم تصل بيانات stores خلال 8 ثوانٍ - مشكلة في Rules أو الاتصال','red');
    log('💡 تحقق من Firebase Rules: يجب أن تكون read: true','blue');
  },8000);
  db.ref('stores').on('value',function(s){
    clearTimeout(timeout);
    var d=s.val();
    if(d) log('✅ stores .on يعمل! وجد '+Object.keys(d).length+' متجر','green');
    else log('⚠️ stores .on يعمل لكن البيانات فارغة','orange');
  },function(e){
    clearTimeout(timeout);
    log('❌ stores .on خطأ: '+e.message+' ('+e.code+')','red');
    if(e.code==='PERMISSION_DENIED') log('🚨 السبب: Firebase Rules لا تسمح بالقراءة - يجب تعديلها','red');
  });
  
  // Test 3: stores with .once
  log('⏳ جاري قراءة stores بـ .once ...','orange');
  db.ref('stores').once('value',function(s){
    var d=s.val();
    if(d) log('✅ stores .once يعمل! وجد '+Object.keys(d).length+' متجر','green');
    else log('⚠️ stores .once - البيانات فارغة','orange');
  },function(e){
    log('❌ stores .once خطأ: '+e.message,'red');
  });

}catch(e){log('❌ خطأ كبير: '+e.message,'red');}
</script>
</body></html>
