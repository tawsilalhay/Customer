<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توصيل الحي</title>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0f172a;direction:rtl;color:#eee;min-height:100vh}
.app{max-width:600px;margin:0 auto;min-height:100vh;background:#0f172a}
.hdr{background:linear-gradient(135deg,#2D5016,#1a3a0a);padding:16px;text-align:center;position:sticky;top:0;z-index:200}
.hdr-title{font-size:20px;font-weight:800;color:#C9A84C;margin-bottom:4px}
.hdr-sub{font-size:12px;color:rgba(255,255,255,.7)}
.search-box{padding:12px 16px;background:#1e293b;display:flex;gap:8px;align-items:center}
.search-box input{flex:1;padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.12);background:#0f172a;color:#fff;font-size:14px;outline:none}
.search-box input:focus{border-color:#C9A84C}
.categories{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;background:#1e293b}
.categories::-webkit-scrollbar{display:none}
.cat-btn{padding:8px 14px;border-radius:20px;border:1.5px solid rgba(255,255,255,.15);background:transparent;color:#888;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit}
.cat-btn.active{background:#C9A84C;color:#1A0A00;border-color:#C9A84C}
.products{padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.prod-card{background:#1e293b;border-radius:12px;border:1px solid rgba(255,255,255,.08);overflow:hidden;cursor:pointer;transition:transform .2s}
.prod-card:active{transform:scale(.98)}
.prod-img{width:100%;height:100px;background:rgba(201,168,76,.1);display:flex;align-items:center;justify-content:center;font-size:24px;object-fit:cover}
.prod-info{padding:10px}
.prod-name{font-size:13px;font-weight:800;color:#fff;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-desc{font-size:11px;color:#64748b;margin-bottom:6px;line-height:1.3}
.prod-price{font-size:14px;font-weight:800;color:#C9A84C;margin-bottom:8px}
.prod-variants{display:flex;flex-direction:column;gap:6px}
.variant-opt{display:flex;justify-content:space-between;align-items:center;padding:6px;background:#0f172a;border-radius:6px;font-size:12px}
.variant-name{color:#ccc}
.variant-price{color:#C9A84C;font-weight:700}
.add-btn{background:#C9A84C;color:#1A0A00;border:none;border-radius:6px;padding:6px 10px;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit}
.cart-fab{position:fixed;bottom:20px;right:20px;width:60px;height:60px;background:#C9A84C;color:#1A0A00;border:none;border-radius:50%;font-size:24px;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.3);font-weight:800;z-index:100}
.cart-fab.show{display:flex}
.cart-badge{position:absolute;top:-8px;right:-8px;background:#ff6b6b;color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
.modal{position:fixed;bottom:0;left:0;right:0;background:#1e293b;border-radius:20px 20px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.4);z-index:200;display:none;flex-direction:column;max-height:85vh;animation:slideUp .3s}
.modal.show{display:flex}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-hdr{padding:16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-between;align-items:center}
.modal-title{font-size:16px;font-weight:800;color:#C9A84C}
.modal-close{background:none;border:none;font-size:24px;color:#888;cursor:pointer}
.modal-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.modal-footer{padding:16px;border-top:1px solid rgba(255,255,255,.08)}
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:10px;background:#0f172a;border-radius:10px}
.cart-item-info{flex:1}
.cart-item-name{font-size:13px;font-weight:700;color:#fff}
.cart-item-var{font-size:11px;color:#64748b;margin-top:2px}
.cart-item-price{font-size:12px;color:#C9A84C;font-weight:700;margin-top:2px}
.qty-ctrl{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border-radius:6px;padding:4px}
.qty-btn{background:none;border:none;color:#C9A84C;width:28px;height:28px;cursor:pointer;font-size:16px;font-weight:700;font-family:inherit}
.qty-val{min-width:24px;text-align:center;font-size:12px;font-weight:700;color:#fff}
.empty-cart{text-align:center;padding:40px 20px;color:#64748b}
.summary{display:flex;justify-content:space-between;padding:10px 0;font-size:13px;border-bottom:1px solid rgba(255,255,255,.08)}
.summary-total{font-size:16px;font-weight:800;color:#C9A84C;padding:12px 0}
.checkout-btn{width:100%;background:#C9A84C;color:#1A0A00;border:none;border-radius:10px;padding:14px;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:150;display:none}
.overlay.show{display:block}
.loading{text-align:center;padding:40px;color:#64748b;font-size:13px}
.spinner{width:30px;height:30px;border:3px solid rgba(255,255,255,.1);border-top-color:#C9A84C;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.notif{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#C9A84C;color:#1A0A00;padding:12px 24px;border-radius:10px;font-weight:800;font-size:13px;z-index:9999;display:none}
.notif.show{display:block}
</style>
</head>
<body>

<div class="app">
  <div class="hdr">
    <div class="hdr-title" id="store-title">توصيل الحي</div>
    <div class="hdr-sub" id="store-type"></div>
  </div>

  <div class="search-box">
    <input type="text" id="search-inp" placeholder="ابحث عن منتج...">
  </div>

  <div class="categories" id="cat-list"></div>

  <div class="products" id="prod-list">
    <div class="loading">
      <div class="spinner"></div>
      <div>جاري التحميل...</div>
    </div>
  </div>

  <button class="cart-fab" id="cart-fab">
    0
    <div class="cart-badge" id="cart-badge" style="display:none">0</div>
  </button>

  <div class="overlay" id="modal-overlay"></div>

  <div class="modal" id="cart-modal">
    <div class="modal-hdr">
      <div class="modal-title">سلة الطلب</div>
      <button class="modal-close" id="modal-close">x</button>
    </div>
    <div class="modal-body" id="cart-list">
      <div class="empty-cart">السلة فارغة</div>
    </div>
    <div class="modal-footer">
      <div class="summary">
        <span>المجموع</span>
        <span id="subtotal">0 ر</span>
      </div>
      <div class="summary">
        <span>الضريبة 15%</span>
        <span id="tax">0 ر</span>
      </div>
      <div class="summary-total">
        <div style="display:flex;justify-content:space-between">
          <span>الاجمالي</span>
          <span id="total">0 ر</span>
        </div>
      </div>
      <input type="text" id="customer-name" placeholder="اسمك او رقم الهاتف" style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,.12);background:#0f172a;color:#fff;margin-bottom:10px;font-family:inherit;font-size:14px">
      <button class="checkout-btn" id="checkout-btn">تاكيد الطلب</button>
    </div>
  </div>
</div>

<div class="notif" id="notif"></div>

<script>
var FB={
  apiKey:'AIzaSyCY31rq2Z608u7O6iFzE6',
  authDomain:'twsilya.firebaseapp.com',
  databaseURL:'https://twsilya-default-rtdb.asia-southeast1.firebasedatabase.app',
  projectId:'twsilya',
  storageBucket:'twsilya.firebasestorage.app',
  messagingSenderId:'191977779172',
  appId:'1:191977779172:web:9297f1be500b4d1cc8e1f1'
};

var db=null;
var storeId=null;
var storeData={};
var products=[];
var cart={};
var currentCat='';
var searchQ='';

function san(s){if(!s)return '';return String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;').substring(0,100);}
function notif(msg){var n=document.getElementById('notif');n.textContent=msg;n.classList.add('show');setTimeout(function(){n.classList.remove('show');},2500);}
function genId(){return Date.now().toString();}

function init(){
  try{
    var app=firebase.apps&&firebase.apps.length>0?firebase.apps[0]:firebase.initializeApp(FB);
    db=firebase.database();
  }catch(e){}
  
  var url=new URL(window.location);
  storeId=url.searchParams.get('sid')||url.searchParams.get('storeId');
  if(!storeId){
    document.getElementById('prod-list').innerHTML='<div class="loading">لم يتم تحديد متجر</div>';
    return;
  }
  
  if(!db) return;
  
  db.ref('stores/'+storeId).on('value',function(snap){
    storeData=snap.val()||{};
    var info=storeData.info||{};
    document.getElementById('store-title').textContent=san(info.name||'متجر');
    document.getElementById('store-type').textContent=san(info.type||'');
  });
  
  db.ref('stores/'+storeId+'/menu').on('value',function(snap){
    var data=snap.val()||{};
    products=[];
    Object.keys(data).forEach(function(kid){
      products.push({id:kid,data:data[kid]});
    });
    renderProducts();
  });
  
  loadCart();
  setupEvents();
}

function renderProducts(){
  var filtered=products;
  
  if(currentCat){
    filtered=filtered.filter(function(p){return p.data.cat===currentCat;});
  }
  if(searchQ){
    var q=searchQ.toLowerCase();
    filtered=filtered.filter(function(p){return p.data.name.toLowerCase().includes(q)||p.data.desc.toLowerCase().includes(q);});
  }
  
  var cats=new Set();
  products.forEach(function(p){if(p.data.cat)cats.add(p.data.cat);});
  
  var catHtml='<button class="cat-btn '+(currentCat?'':'active')+'" data-cat="">الكل</button>';
  cats.forEach(function(c){
    catHtml+='<button class="cat-btn '+(currentCat===c?'active':'')+'" data-cat="'+san(c)+'">'+san(c)+'</button>';
  });
  document.getElementById('cat-list').innerHTML=catHtml;
  
  if(!filtered.length){
    document.getElementById('prod-list').innerHTML='<div class="loading">لا توجد منتجات</div>';
    return;
  }
  
  var html='';
  filtered.forEach(function(p){
    var d=p.data;
    html+='<div class="prod-card"><div class="prod-img">'+(d.icon||'')+'</div><div class="prod-info">'
      +'<div class="prod-name">'+san(d.name)+'</div>'
      +'<div class="prod-desc">'+san(d.desc)+'</div>'
      +'<div class="prod-price">'+d.price+' ر</div>'
      +'<div class="prod-variants">';
    
    if(d.variants&&Array.isArray(d.variants)&&d.variants.length){
      d.variants.forEach(function(v){
        var vid=p.id+'-'+san(v.name);
        var qty=cart[vid]?cart[vid].qty:0;
        html+='<div class="variant-opt"><div><span class="variant-name">'+san(v.name)+'</span> <span class="variant-price">'+v.price+'ر</span></div>'
          +'<button class="add-btn" data-id="'+vid+'" data-price="'+v.price+'" data-name="'+san(d.name)+'" data-var="'+san(v.name)+'">اضافة</button></div>';
      });
    } else {
      var vid=p.id+'-main';
      html+='<div class="variant-opt"><div><span class="variant-price">'+d.price+'ر</span></div>'
        +'<button class="add-btn" data-id="'+vid+'" data-price="'+d.price+'" data-name="'+san(d.name)+'" data-var="عادي">اضافة</button></div>';
    }
    
    html+='</div></div></div>';
  });
  
  document.getElementById('prod-list').innerHTML=html;
}

function addToCart(itemId,price,name,variant){
  if(!cart[itemId]){
    cart[itemId]={price:price,name:name,variant:variant,qty:0};
  }
  cart[itemId].qty++;
  saveCart();
  updateCartUI();
  notif('تمت الاضافة');
}

function updateQty(itemId,delta){
  if(cart[itemId]){
    cart[itemId].qty+=delta;
    if(cart[itemId].qty<=0) delete cart[itemId];
    saveCart();
    updateCartUI();
  }
}

function updateCartUI(){
  var total=0;
  Object.keys(cart).forEach(function(id){total+=cart[id].qty;});
  
  var fab=document.getElementById('cart-fab');
  if(total>0){
    fab.classList.add('show');
    fab.textContent=total;
  } else {
    fab.classList.remove('show');
  }
  
  renderCart();
}

function renderCart(){
  var el=document.getElementById('cart-list');
  var items=Object.keys(cart);
  if(!items.length){el.innerHTML='<div class="empty-cart">السلة فارغة</div>';updateSummary();return;}
  
  var html='';
  items.forEach(function(id){
    var item=cart[id];
    html+='<div class="cart-item"><div class="cart-item-info"><div class="cart-item-name">'+san(item.name)+'</div>'
      +'<div class="cart-item-var">'+san(item.variant)+'</div>'
      +'<div class="cart-item-price">'+item.price+'ر x '+item.qty+'</div></div>'
      +'<div class="qty-ctrl"><button class="qty-btn" data-id="'+id+'" data-op="-">-</button>'
      +'<div class="qty-val">'+item.qty+'</div>'
      +'<button class="qty-btn" data-id="'+id+'" data-op="+">+</button></div></div>';
  });
  el.innerHTML=html;
  updateSummary();
}

function updateSummary(){
  var sub=0;
  Object.keys(cart).forEach(function(id){
    sub+=cart[id].price*cart[id].qty;
  });
  var tx=Math.round(sub*0.15);
  var tot=sub+tx;
  document.getElementById('subtotal').textContent=sub+' ر';
  document.getElementById('tax').textContent=tx+' ر';
  document.getElementById('total').textContent=tot+' ر';
}

function saveCart(){
  try{localStorage.setItem('cart_'+storeId,JSON.stringify(cart));}catch(e){}
}

function loadCart(){
  try{var d=localStorage.getItem('cart_'+storeId);if(d) cart=JSON.parse(d);updateCartUI();}catch(e){}
}

function checkout(){
  var name=document.getElementById('customer-name').value.trim();
  if(!name){notif('ادخل الاسم او الرقم');return;}
  if(!Object.keys(cart).length){notif('السلة فارغة');return;}
  
  var sub=0;
  Object.keys(cart).forEach(function(id){sub+=cart[id].price*cart[id].qty;});
  var tx=Math.round(sub*0.15);
  var tot=sub+tx;
  
  var order={
    name:name,
    customerName:name,
    items:cart,
    subtotal:sub,
    tax:tx,
    total:tot,
    status:'pending',
    createdAt:Date.now()
  };
  
  if(!db) return;
  db.ref('stores/'+storeId+'/orders').push(order,function(err){
    if(err){notif('خطا');return;}
    notif('تم تاكيد الطلب');
    cart={};
    saveCart();
    document.getElementById('customer-name').value='';
    setTimeout(function(){
      document.getElementById('cart-modal').classList.remove('show');
      document.getElementById('modal-overlay').classList.remove('show');
      updateCartUI();
    },1000);
  });
}

function setupEvents(){
  document.getElementById('cart-fab').addEventListener('click',function(){
    if(!Object.keys(cart).length) return;
    document.getElementById('cart-modal').classList.add('show');
    document.getElementById('modal-overlay').classList.add('show');
  });
  
  document.getElementById('modal-close').addEventListener('click',function(){
    document.getElementById('cart-modal').classList.remove('show');
    document.getElementById('modal-overlay').classList.remove('show');
  });
  
  document.getElementById('modal-overlay').addEventListener('click',function(){
    document.getElementById('cart-modal').classList.remove('show');
    document.getElementById('modal-overlay').classList.remove('show');
  });
  
  document.getElementById('checkout-btn').addEventListener('click',checkout);
  
  document.getElementById('search-inp').addEventListener('input',function(){
    searchQ=this.value;
    renderProducts();
  });
  
  document.addEventListener('click',function(e){
    if(e.target.classList.contains('cat-btn')){
      currentCat=e.target.dataset.cat;
      renderProducts();
    }
    if(e.target.classList.contains('add-btn')){
      addToCart(e.target.dataset.id,parseFloat(e.target.dataset.price),e.target.dataset.name,e.target.dataset.var);
    }
    if(e.target.classList.contains('qty-btn')){
      updateQty(e.target.dataset.id,e.target.dataset.op==='+'?1:-1);
    }
  });
}

window.addEventListener('load',init);
</script>
</body>
</html>
