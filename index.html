<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توصيل الحي - تشخيص</title>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui;background:#F7F3EE;direction:rtl;padding:20px;color:#1A0A00}
.box{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #E8DFD0}
.ok{color:#2D5016;font-weight:700}
.err{color:#dc2626;font-weight:700}
.store-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;border:2px solid #2D5016}
.store-name{font-size:18px;font-weight:800;color:#2D5016}
button{background:#2D5016;color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:15px;font-weight:700;cursor:pointer;width:100%;margin-top:8px;font-family:inherit}
</style>
</head>
<body>
<h2 style="margin-bottom:16px;color:#2D5016">🔍 تشخيص توصيل الحي</h2>
<div id="log"></div>

<script>
function log(msg, ok){
  var d=document.createElement('div');
  d.className='box';
  d.innerHTML='<span class="'+(ok===false?'err':'ok')+'">'+msg+'</span>';
  document.getElementById('log').appendChild(d);
}

var FB={
  apiKey:'AIzaSyCY31rq2Z608u7O6iFzE6',
  authDomain:'twsilya.firebaseapp.com',
  databaseURL:'https://twsilya-default-rtdb.asia-southeast1.firebasedatabase.app',
  projectId:'twsilya',
  storageBucket:'twsilya.firebasestorage.app',
  messagingSenderId:'191977779172',
  appId:'1:191977779172:web:9297f1be500b4d1cc8e1f1'
};

try {
  var app = firebase.initializeApp(FB);
  var db = firebase.database();
  log('✅ Firebase اتصل بنجاح');

  db.ref('stores').on('value', function(snap){
    var data = snap.val();
    if(!data){
      log('❌ لا توجد بيانات في stores', false);
      return;
    }
    var ids = Object.keys(data);
    log('✅ وجد ' + ids.length + ' متجر');

    ids.forEach(function(sid){
      var s = data[sid];
      var info = s.info || {};
      var visible = info.visible;
      var d2 = document.createElement('div');
      d2.className = 'store-card';
      d2.innerHTML = '<div class="store-name">'+(info.emoji||'🏪')+' '+info.name+'</div>'
        +'<div>الحالة: '+(info.status||'غير محدد')+'</div>'
        +'<div>visible: '+(visible===undefined?'<b style="color:orange">غير محدد (يُعرض)</b>':visible?'<b class="ok">true ✅</b>':'<b class="err">false ❌ مخفي</b>')+'</div>'
        +'<div>username: '+info.username+'</div>';
      document.getElementById('log').appendChild(d2);
    });

    // Test renderStoreList logic
    var shown = ids.filter(function(sid){
      var info2 = (data[sid].info||{});
      return info2.visible !== false;
    });
    log('✅ المتاجر التي يجب أن تظهر: ' + shown.length + ' متجر');
    shown.forEach(function(sid){
      log('→ ' + (data[sid].info||{}).name);
    });
  });

} catch(e) {
  log('❌ خطأ: ' + e.message, false);
}
</script>
</body>
</html>
